baseURL = "https://dzikir.ethiqshub.com/"
languageCode = "id"
title = "Dzikir with EthiqsHub"
theme = "dzikir-theme"

disableKinds = ["taxonomy", "term"]

[params]
  description = "Kumpulan amalan Islami untuk berbagai situasi"
  author = "Tegar Imansyah"
  
  # PWA Configuration
  [params.pwa]
    enabled = true
    manifest = "/manifest.json"
    serviceWorker = "/sw.js"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Use relative URLs - works across all domains
relativeURLs = true
canonifyURLs = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"
