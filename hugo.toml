baseURL = "https://dzikir.ethiqshub.com/"
languageCode = "id"
title = "Dzikir with EthiqsHub"
theme = "muslim-flashcard-theme"

[params]
  description = "Kumpulan doa-doa dalam Islam untuk berbagai situasi"
