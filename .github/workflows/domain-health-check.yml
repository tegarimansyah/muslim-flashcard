name: Domain Health Check

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  check-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Check Domain Accessibility
        id: domain-check
        run: |
          echo "Checking if dzikir.ethiqshub.com is accessible..."
          
          # Check if domain resolves
          if nslookup dzikir.ethiqshub.com >/dev/null 2>&1; then
            echo "✅ Domain DNS resolution: SUCCESS"
            echo "dns_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Domain DNS resolution: FAILED"
            echo "dns_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Check SSL Certificate
        id: ssl-check
        run: |
          echo "Checking SSL certificate for dzikir.ethiqshub.com..."
          
          # Check SSL certificate
          if curl -sSf https://dzikir.ethiqshub.com >/dev/null 2>&1; then
            echo "✅ SSL Certificate: VALID"
            
            # Get certificate details
            CERT_INFO=$(echo | openssl s_client -connect dzikir.ethiqshub.com:443 -servername dzikir.ethiqshub.com 2>/dev/null | openssl x509 -noout -dates -subject 2>/dev/null)
            echo "Certificate Details:"
            echo "$CERT_INFO"
            
            echo "ssl_status=valid" >> $GITHUB_OUTPUT
          else
            echo "❌ SSL Certificate: INVALID or Not Configured"
            echo "ssl_status=invalid" >> $GITHUB_OUTPUT
          fi

      - name: Test Website Response
        id: response-check
        run: |
          echo "Testing website response..."
          
          # Get HTTP status code
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://dzikir.ethiqshub.com || echo "000")
          
          echo "HTTP Status Code: $STATUS_CODE"
          
          if [ "$STATUS_CODE" = "200" ] || [ "$STATUS_CODE" = "301" ] || [ "$STATUS_CODE" = "302" ]; then
            echo "✅ Website Response: SUCCESS ($STATUS_CODE)"
            echo "response_status=success" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Website Response: Issue detected ($STATUS_CODE)"
            echo "response_status=issue" >> $GITHUB_OUTPUT
          fi

      - name: Check Content
        id: content-check
        run: |
          echo "Checking website content..."
          
          # Get page content and check for key elements
          CONTENT=$(curl -s https://dzikir.ethiqshub.com)
          
          if echo "$CONTENT" | grep -q "Kumpulan Doa Doa Dalam Islam"; then
            echo "✅ Website Content: Correct title found"
            echo "content_status=correct" >> $GITHUB_OUTPUT
          else
            echo "❌ Website Content: Title not found or content different"
            echo "content_status=incorrect" >> $GITHUB_OUTPUT
          fi

      - name: Generate Health Report
        if: always()
        run: |
          echo "═════════════════════════════════════════════"
          echo "🌐 DOMAIN HEALTH CHECK REPORT"
          echo "═════════════════════════════════════════════"
          echo "Domain: dzikir.ethiqshub.com"
          echo "Timestamp: $(date)"
          echo ""
          echo "📋 Status Summary:"
          echo "DNS Resolution: ${{ steps.domain-check.outputs.dns_status }}"
          echo "SSL Certificate: ${{ steps.ssl-check.outputs.ssl_status }}"
          echo "HTTP Response: ${{ steps.response-check.outputs.response_status }}"
          echo "Content Check: ${{ steps.content-check.outputs.content_status }}"
          echo "═════════════════════════════════════════════"

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Domain Health Check Failed - dzikir.ethiqshub.com',
              body: `## Domain Health Check Failed
              
              The automated health check for \`dzikir.ethiqshub.com\` has detected issues.
              
              **Timestamp:** ${new Date().toISOString()}
              
              ### Status Summary:
              - **DNS Resolution:** ${{ steps.domain-check.outputs.dns_status }}
              - **SSL Certificate:** ${{ steps.ssl-check.outputs.ssl_status }}
              - **HTTP Response:** ${{ steps.response-check.outputs.response_status }}
              - **Content Check:** ${{ steps.content-check.outputs.content_status }}
              
              ### Recommended Actions:
              1. Check Cloudflare DNS settings
              2. Verify GitHub Pages custom domain configuration
              3. Ensure SSL certificate is properly provisioned
              4. Check if the website is deploying correctly
              
              [View Workflow Run](${context.payload.repository.html_url}/actions/runs/${context.runId})
              `,
              labels: ['bug', 'domain', 'health-check']
            })