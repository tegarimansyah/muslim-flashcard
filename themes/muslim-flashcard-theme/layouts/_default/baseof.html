<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        /* Option Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }
        .modal.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background-color: var(--white);
            margin: 10% auto;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.3s ease;
            max-width: 600px;
            width: 90%;
        }
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .modal-header h2 {
            color: var(--dark-color);
            font-size: 1.5rem;
            margin: 0;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            color: var(--gray-medium);
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .close-btn:hover {
            background-color: var(--gray-light);
            color: var(--dark-color);
        }
        .option-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .btn-option {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            width: 100%;
        }
        .option-icon {
            font-size: 2.5rem;
        }
        .option-text h3 {
            font-size: 1.2rem;
            color: var(--dark-color);
            margin-bottom: 0.3rem;
        }
        .option-text p {
            color: var(--gray-medium);
            font-size: 0.9rem;
        }
        .btn-study {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: var(--white);
        }
        .btn-study:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow);
        }
        .btn-memorize {
            background: linear-gradient(135deg, var(--accent-color), #6d28d9);
            color: var(--white);
        }
        .btn-memorize:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🕌 Kumpulan Doa Doa Dalam Islam</h1>
            <p>Kumpulan doa-doa untuk berbagai situasi dalam kehidupan sehari-hari</p>
        </div>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Muslim Flashcard - Dibuat dengan ❤️ untuk umat</p>
        </div>
    </footer>

    <!-- Option Modal -->
    <div id="option-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="option-modal-title">Pilih Mode</h2>
                <button class="close-btn" onclick="closeModal('option-modal')">&times;</button>
            </div>
            <div class="option-buttons">
                <button onclick="navigateToPahami()" class="btn-option btn-study">
                    <span class="option-icon">📖</span>
                    <div class="option-text">
                        <h3>Lihat untuk Pahami</h3>
                        <p>Pelajari asal usul, sejarah, dan makna doa secara lengkap</p>
                    </div>
                </button>
                <button onclick="navigateToMenghafal()" class="btn-option btn-memorize">
                    <span class="option-icon">🧠</span>
                    <div class="option-text">
                        <h3>Membaca dan Menghafal</h3>
                        <p>Latih hafalan dengan tampilan sederhana dan fokus</p>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentGroupId = null;

        window.openModal = function(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        };

        window.closeModal = function(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        };

        function showOptionModal(groupId) {
            currentGroupId = groupId;
            openModal('option-modal');
        }

        function navigateToPahami() {
            if (currentGroupId) {
                window.location.href = `/pahami/${currentGroupId}/`;
            }
        }

        function navigateToMenghafal() {
            if (currentGroupId) {
                window.location.href = `/menghafal/${currentGroupId}/`;
            }
        }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                    document.body.style.overflow = 'auto';
                }
            });
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal.active').forEach(modal => {
                    modal.classList.remove('active');
                    document.body.style.overflow = 'auto';
                });
            }
        });
    </script>
</body>
</html>
