{{ define "main" }}
<div class="container">
    <div class="search-section">
        <input type="text" id="searchInput" placeholder="🔍 Cari doa..." class="search-input">
    </div>

    <div class="groups-grid" id="groupsGrid">
        {{ range $index, $group := $.Site.Data.doa.groups }}
        <div class="group-card" data-group-id="{{ $group.id }}" style="border-color: {{ $group.color }}">
            <div class="group-icon" style="background-color: {{ $group.color }}">{{ $group.icon }}</div>
            <h2>{{ $group.title }}</h2>
            <p class="group-description">{{ $group.description }}</p>
            <p class="card-count">{{ len $group.cards }} doa</p>
            <!-- Changed: Now shows first doa modal instead of navigating -->
            <button onclick="showFirstDoaModal('{{ $group.id }}', '{{ $group.cards 0.id }}')" class="btn-explore">
                Lihat Doa →
            </button>
        </div>
        {{ end }}
    </div>
</div>

<!-- Store doa data in JavaScript for modal functionality -->
<script>
window.doaData = {
    {{ range $group := $.Site.Data.doa.groups }}
    "{{ $group.id }}": [
        {{ range $card := $group.cards }}
        {
            id: "{{ $card.id }}",
            title: "{{ $card.title }}",
            arabic: "{{ $card.arabic }}",
            latin: "{{ $card.latin }}",
            translation: "{{ $card.translation }}",
            background: "{{ $card.background }}",
            source: "{{ $card.source }}",
            groupColor: "{{ $group.color }}",
            groupIcon: "{{ $group.icon }}",
            groupTitle: "{{ $group.title }}",
            cards: [
                {{ range $c := $group.cards }}
                {
                    id: "{{ $c.id }}",
                    title: "{{ $c.title }}"
                }{{ if not $c.Last }}{{ end }}
                {{ end }}
            ]
        }{{ if not $card.Last }}{{ end }}
        {{ end }}
    ],
    {{ end }}
};

function showFirstDoaModal(groupId, cardId) {
    showDoaModal(groupId, cardId);
}
</script>

<script>
    // Search functionality
    const searchInput = document.getElementById('searchInput');
    const groupsGrid = document.getElementById('groupsGrid');

    searchInput.addEventListener('input', function() {
        const searchTerm = this.value.toLowerCase();
        const groupCards = groupsGrid.querySelectorAll('.group-card');

        groupCards.forEach(card => {
            const title = card.querySelector('h2').textContent.toLowerCase();
            const description = card.querySelector('.group-description').textContent.toLowerCase();

            if (title.includes(searchTerm) || description.includes(searchTerm)) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });
    });
</script>
{{ end }}
